<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Emmy Tracker 2026</title>
<style>
  :root {
    --bg: #0e0e12;
    --card: #17171d;
    --card-2: #1e1e26;
    --border: #2a2a33;
    --text: #f2f1ec;
    --muted: #9a99a6;
    --gold: #d4af37;
    --gold-dim: #8a7326;
    --green: #3fb950;
    --pink: #e0568c;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #app { max-width: 640px; margin: 0 auto; padding: 0 14px 90px; }

  header.top {
    position: sticky; top: 0; z-index: 20;
    background: linear-gradient(180deg, var(--bg) 80%, transparent);
    padding: 18px 0 10px;
  }
  .title-row { display: flex; align-items: center; gap: 12px; }
  .title-row h1 { font-size: 21px; margin: 0; font-weight: 700; letter-spacing: -0.2px; }
  .title-row .sub { color: var(--muted); font-size: 12.5px; margin-top: 2px; }

  .overall {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-top: 14px;
  }
  .overall .stats { flex: 1; }
  .overall .stats .big { font-size: 22px; font-weight: 700; }
  .overall .stats .lbl { color: var(--muted); font-size: 12.5px; margin-top: 2px; }
  .overall .saved { color: var(--muted); font-size: 11px; margin-top: 6px; }
  .overall .picks-summary { color: var(--muted); font-size: 11px; margin-top: 3px; }

  .search-wrap { margin-top: 12px; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 10px 32px 10px 12px; font-size: 14px;
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--gold-dim); }
  .search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 13px; cursor: pointer; display: none;
    width: 20px; height: 20px; border-radius: 50%; align-items: center; justify-content: center;
  }
  .search-clear.show { display: flex; }
  .search-clear:hover { color: var(--text); }

  .tabs {
    display: flex; gap: 6px; margin-top: 12px; overflow-x: auto; padding-bottom: 2px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    white-space: nowrap; padding: 7px 13px; border-radius: 999px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); font-size: 12.5px; cursor: pointer; user-select: none;
  }
  .tab.active { background: var(--gold); color: #1a1608; border-color: var(--gold); font-weight: 600; }

  .cat-list { margin-top: 14px; display: flex; flex-direction: column; gap: 9px; }
  .cat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .cat-head { display: flex; align-items: center; gap: 11px; padding: 13px 14px; cursor: pointer; }
  .cat-icon { font-size: 19px; width: 26px; text-align: center; }
  .cat-info { flex: 1; min-width: 0; }
  .cat-info .name { font-size: 14.5px; font-weight: 600; line-height: 1.25; }
  .cat-info .grp { font-size: 11px; color: var(--muted); margin-top: 1px; display: flex; align-items: center; gap: 6px; }
  .cat-pick-dot { font-size: 10.5px; }
  .cat-count { font-size: 11.5px; color: var(--muted); margin-right: 2px; white-space: nowrap; }
  .chev { color: var(--muted); font-size: 12px; transition: transform .15s ease; }
  .cat-card.open .chev { transform: rotate(90deg); }

  .ring { flex-shrink: 0; }
  .ring circle.track { stroke: var(--border); fill: none; }
  .ring circle.prog { stroke: var(--gold); fill: none; stroke-linecap: round; transition: stroke-dashoffset .35s ease; }
  .ring.done circle.prog { stroke: var(--green); }

  .nom-list { border-top: 1px solid var(--border); }
  .nom-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 14px; border-bottom: 1px solid var(--border);
  }
  .nom-row:last-child { border-bottom: none; }
  .nom-check {
    width: 21px; height: 21px; border-radius: 6px; border: 1.5px solid var(--muted);
    flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    background: transparent; transition: background .15s ease, border-color .15s ease;
  }
  .nom-check.checked { background: var(--gold); border-color: var(--gold); color: #1a1608; font-weight: 700; }
  .nom-body { flex: 1; min-width: 0; }
  .nom-text { font-size: 13.8px; line-height: 1.35; }
  .nom-text.checked { color: var(--text); }
  .nom-episode { font-size: 11.5px; color: var(--muted); font-style: italic; margin-top: 2px; }
  .nom-meta { display: flex; align-items: center; gap: 7px; margin-top: 6px; flex-wrap: wrap; }
  .nom-link {
    font-size: 11.5px; color: var(--gold); cursor: pointer; white-space: nowrap;
  }
  .stream-badge {
    font-size: 10.5px; color: var(--muted); background: var(--card-2);
    border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px;
  }

  .pick-btn {
    font-size: 13px; line-height: 1; padding: 4px 7px; border-radius: 999px;
    background: var(--card-2); border: 1px solid var(--border); cursor: pointer;
    opacity: .55; filter: grayscale(1); transition: opacity .15s ease, filter .15s ease, border-color .15s ease, background .15s ease;
  }
  .pick-btn.active { opacity: 1; filter: none; }
  .pick-btn.active.predicted { border-color: var(--gold); background: rgba(212,175,55,.12); }
  .pick-btn.active.wanted { border-color: var(--pink); background: rgba(224,86,140,.12); }

  /* toast */
  #toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
    background: var(--gold); color: #1a1608; font-weight: 700; font-size: 13px;
    padding: 9px 18px; border-radius: 999px; opacity: 0; pointer-events: none;
    transition: opacity .2s ease, transform .2s ease; z-index: 100;
    box-shadow: 0 6px 20px rgba(0,0,0,.4);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* detail modal */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 50;
    display: none; align-items: flex-end; justify-content: center;
  }
  #overlay.show { display: flex; }
  #detail {
    background: var(--bg); border: 1px solid var(--border); border-bottom: none;
    border-radius: 18px 18px 0 0; width: 100%; max-width: 640px;
    max-height: 88vh; overflow-y: auto; padding: 18px 16px 26px;
  }
  .detail-head { display: flex; align-items: flex-start; gap: 10px; }
  .detail-head h2 { margin: 0; font-size: 19px; flex: 1; }
  .detail-close {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    width: 30px; height: 30px; border-radius: 50%; font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .detail-sub { color: var(--muted); font-size: 12.5px; margin-top: 3px; }
  .stream-section { margin-top: 14px; }
  .stream-section .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .provider-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .provider-chip {
    font-size: 12px; background: var(--card-2); border: 1px solid var(--border);
    border-radius: 999px; padding: 4px 11px;
  }
  .stream-empty { font-size: 12.5px; color: var(--muted); }
  .stream-link { display: inline-block; margin-top: 8px; font-size: 12.5px; color: var(--gold); }

  .mark-all-btn {
    width: 100%; margin-top: 16px; background: var(--gold); color: #1a1608;
    border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700;
    cursor: pointer;
  }
  .mark-all-btn.done { background: var(--green); color: #08210c; }

  .detail-noms { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; }
  .detail-nom-row {
    display: flex; align-items: flex-start; gap: 10px; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
  }
  .detail-nom-row .txt { flex: 1; font-size: 13px; }
  .detail-nom-row .cat {
    color: var(--gold); font-size: 13px; font-weight: 700;
    margin-bottom: 4px; display: flex; align-items: center; gap: 5px;
  }

  .empty-state { text-align: center; color: var(--muted); font-size: 13px; padding: 40px 20px; }

  /* search highlighting */
  mark.hl { background: rgba(212,175,55,.32); color: inherit; border-radius: 3px; padding: 0 1px; }

  /* countdown */
  .overall .countdown { color: var(--gold); font-size: 11.5px; font-weight: 600; margin-top: 4px; }

  /* filter pills (Focus Mode / Hide completed) */
  .filter-row { display: flex; gap: 6px; margin-top: 10px; }
  .filter-pill {
    padding: 6px 12px; border-radius: 999px; background: var(--card); border: 1px solid var(--border);
    color: var(--muted); font-size: 12px; cursor: pointer; user-select: none;
  }
  .filter-pill.active { background: rgba(212,175,55,.15); border-color: var(--gold); color: var(--gold); font-weight: 600; }
  .hidden-note { color: var(--muted); font-size: 11.5px; text-align: center; padding: 9px 14px; }

  /* posters */
  .poster-thumb { border-radius: 6px; object-fit: cover; background: var(--card-2); display: block; flex-shrink: 0; }
  .poster-thumb.sm { width: 34px; height: 49px; }
  .poster-thumb.lg { width: 72px; height: 104px; border-radius: 8px; }
  .poster-thumb.xl { width: 60px; height: 87px; border-radius: 8px; }
  .poster-placeholder { display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--muted); border: 1px solid var(--border); }

  /* Up Next */
  .upnext-section { margin-top: 14px; }
  .upnext-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .upnext-title { font-size: 14px; font-weight: 700; }
  .upnext-manage { font-size: 11.5px; color: var(--gold); cursor: pointer; white-space: nowrap; }
  .upnext-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
  .upnext-scroll::-webkit-scrollbar { display: none; }
  .upnext-card { flex-shrink: 0; width: 84px; cursor: pointer; }
  .upnext-card-title {
    font-size: 11.5px; font-weight: 600; margin-top: 5px; line-height: 1.25;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .upnext-card-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .upnext-onservice { color: var(--green); }
  .upnext-empty { color: var(--muted); font-size: 12.5px; padding: 10px 2px; }

  /* streaming services modal */
  .service-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .service-chip {
    padding: 8px 14px; border-radius: 10px; background: var(--card-2); border: 1px solid var(--border);
    font-size: 13px; cursor: pointer; user-select: none;
  }
  .service-chip.active { background: rgba(212,175,55,.15); border-color: var(--gold); color: var(--gold); font-weight: 600; }

  /* completion celebration */
  #confettiLayer { position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden; }
  .confetti-piece {
    position: absolute; top: -20px; width: 8px; height: 8px; border-radius: 2px;
    animation-name: confettiFall; animation-timing-function: ease-in; animation-fill-mode: forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(540deg); opacity: 0; }
  }
  .cat-card.celebrate { animation: cardFlash .9s ease; }
  @keyframes cardFlash {
    0% { box-shadow: 0 0 0 0 rgba(212,175,55,0); }
    30% { box-shadow: 0 0 0 4px rgba(212,175,55,.55); }
    100% { box-shadow: 0 0 0 0 rgba(212,175,55,0); }
  }
</style>
</head>

    <div class="title-row">
      <div style="font-size:26px;">🏆</div>
      <div>
        <h1>Emmy Tracker 2026</h1>
        <div class="sub">Series, performance, directing &amp; writing nominees</div>
      </div>
    </div>

          stroke-dasharray="138.2" stroke-dashoffset="138.2"

      <div class="stats">

    <div class="upnext-section" id="upnextSection">

      </div>
      <div class="upnext-scroll" id="upnextScroll"></div>
    </div>

    <div class="search-wrap">

      <span class="search-clear" id="searchClear">✕</span>
    </div>

    <div class="filter-row">

      <span class="filter-pill" id="hideCompletedToggle">✓ Hide completed</span>
      <span class="filter-pill" id="collapseAllBtn">⌃ Collapse all</span>
    </div>

    <div class="tabs" id="tabs"></div>
  </header>

  <div class="cat-list" id="catList"></div>
  <div class="empty-state" id="emptyState" style="display:none;">No matches.</div>
</div>

<div id="overlay">
  <div id="detail"></div>
</div>

<div id="toast">✓ Saved</div>

<div id="confettiLayer"></div>

const STORAGE_KEY = "emmyTracker2026:v2";

/* ---------- state ---------- */
// entries: { "catId#idx": true/false }             -> watched
// picks:   { catId: { predicted: idx|null, wanted: idx|null } }  -> per-category, single choice each
let state = { entries: {}, picks: {}, updatedAt: null };
(function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === "object") state = Object.assign(state, parsed);
    }
  } catch (e) { /* ignore corrupt storage */ }
})();

function saveState() {
  state.updatedAt = new Date().toISOString();
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  renderSavedAt();
  showToast("✓ Saved");
}

function entryKey(catId, idx) { return catId + "#" + idx; }
function isChecked(catId, idx) { return !!state.entries[entryKey(catId, idx)]; }
function setChecked(catId, idx, val) { state.entries[entryKey(catId, idx)] = !!val; }

function getPredicted(catId) { return state.picks[catId] ? state.picks[catId].predicted : null; }
function getWanted(catId) { return state.picks[catId] ? state.picks[catId].wanted : null; }
function setPredicted(catId, idx) {
  if (!state.picks[catId]) state.picks[catId] = { predicted: null, wanted: null };
  state.picks[catId].predicted = state.picks[catId].predicted === idx ? null : idx;
  saveState();
}
function setWanted(catId, idx) {
  if (!state.picks[catId]) state.picks[catId] = { predicted: null, wanted: null };
  state.picks[catId].wanted = state.picks[catId].wanted === idx ? null : idx;
  saveState();
}

/* ---------- extractFilm / cascade ---------- */
function extractFilm(nomineeStr) {
  if (!nomineeStr) return null;
  // "Song" — Title
  let m = nomineeStr.match(/^"[^"]+"\s*—\s*(.+)$/);
  if (m) return m[1].trim();
  // Person — Title  (only split on the LAST em dash so titles containing "—" survive)
  const lastDash = nomineeStr.lastIndexOf("—");
  if (lastDash !== -1) {
    const left = nomineeStr.slice(0, lastDash).trim();
    const right = nomineeStr.slice(lastDash + 1).trim();
    if (left && right) return right;
  }
  // bare title
  return nomineeStr.trim();
}

// showTitle -> [{catId, idx}]
let SHOW_INDEX = {};
function buildShowIndex() {
  SHOW_INDEX = {};
  CATEGORIES.forEach(cat => {
    cat.nominees.forEach((n, idx) => {
      const film = extractFilm(n.display);
      if (!film) return;
      if (!SHOW_INDEX[film]) SHOW_INDEX[film] = [];
      SHOW_INDEX[film].push({ catId: cat.id, idx });
    });
  });
}
buildShowIndex();

function cascadeFilm(title, checked) {
  const refs = SHOW_INDEX[title] || [];
  refs.forEach(r => setChecked(r.catId, r.idx, checked));
  saveState();
  renderAll();
}

/* ---------- streaming ---------- */
const streamCache = {};
const streamInFlight = {};
function fetchStreaming(title) {
  if (streamCache[title]) return Promise.resolve(streamCache[title]);
  if (streamInFlight[title]) return streamInFlight[title];
  const p = fetch("/.netlify/functions/streaming?title=" + encodeURIComponent(title))
    .then(r => r.json())
    .then(data => { streamCache[title] = data; delete streamInFlight[title]; return data; })
    .catch(() => { const empty = { flatrate: [], rent: [], buy: [], link: null }; streamCache[title] = empty; delete streamInFlight[title]; return empty; });
  streamInFlight[title] = p;
  return p;
}

function prefetchCategory(cat) {
  const titles = new Set(cat.nominees.map(n => extractFilm(n.display)).filter(Boolean));
  titles.forEach(t => {
    fetchStreaming(t).then(() => paintStreamData(cat.id, t));
  });
}

function paintStreamData(catId, title) {
  const data = streamCache[title];
  if (!data) return;
  document.querySelectorAll('.nom-row').forEach(row => {
    if (row.dataset.cat === catId && row.dataset.film === title) {
      const slot = row.querySelector('.stream-slot');
      if (slot) slot.innerHTML = streamBadgeHtml(data);
      const posterSlot = row.querySelector('.poster-slot');
      if (posterSlot) posterSlot.innerHTML = posterHtmlFor(title, "sm");
    }
  });
}

function posterHtmlFor(title, sizeClass) {
  const data = streamCache[title];
  if (data && data.poster) {
    return '<img class="poster-thumb ' + sizeClass + '" src="' + escapeHtml(data.poster) + '" alt="" loading="lazy">';
  }
  return '<div class="poster-thumb ' + sizeClass + ' poster-placeholder">🎬</div>';
}

function streamBadgeHtml(data) {
  if (!data) return "";
  if (data.flatrate && data.flatrate.length) return '<span class="stream-badge">▶ ' + escapeHtml(data.flatrate[0]) + (data.flatrate.length > 1 ? " +" + (data.flatrate.length - 1) : "") + '</span>';
  if (data.rent && data.rent.length) return '<span class="stream-badge">$ Rent</span>';
  if (data.buy && data.buy.length) return '<span class="stream-badge">$ Buy</span>';
  return '<span class="stream-badge">No streaming data</span>';
}

/* ---------- toast ---------- */
let toastTimer = null;
function showToast(message, duration) {
  const t = document.getElementById("toast");
  t.textContent = message || "✓ Saved";
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), duration || 1800);
}

function renderSavedAt() {
  const el = document.getElementById("savedAt");
  if (!state.updatedAt) { el.textContent = "Not saved yet"; return; }
  const d = new Date(state.updatedAt);
  el.textContent = "Last saved " + d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) + " at " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
}

  "Craft": "Craft", "Other": "Other",
};
const GROUP_LABELS = { "Series/Program": "Series & Specials", "Performance": "Performance", "Directing": "Directing", "Writing": "Writing", "Craft": "Craft" };

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// Wraps every case-insensitive occurrence of the current search query in
// <mark>, so results visually pop instead of you having to re-read every row.
function highlightText(text, query) {
  const safe = escapeHtml(text);
  if (!query) return safe;
  const q = query.trim();
  if (!q) return safe;
  const escapedQuery = escapeHtml(q).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const re = new RegExp("(" + escapedQuery + ")", "ig");
  return safe.replace(re, "<mark class=\"hl\">$1</mark>");
}

/* ---------- Focus Mode / hide-completed / streaming services ---------- */
const FOCUS_MODE_KEY = "emmyTracker2026:focusMode";
const HIDE_COMPLETED_KEY = "emmyTracker2026:hideCompleted";
const SERVICES_KEY = "emmyTracker2026:services";
const MILESTONE_KEY = "emmyTracker2026:milestones";

// Focus Mode narrows down to the marquee scripted categories (Drama, Comedy,
// Limited/Anthology). Everything else — Variety, Reality/Game Show,
// Documentary, Craft, Other — is hidden until you toggle it off.
const FOCUS_HIDDEN_TYPES = ["Variety", "Reality/Game Show", "Documentary", "Craft", "Other"];

let focusMode = (function () {
  const raw = localStorage.getItem(FOCUS_MODE_KEY);
  return raw === null ? true : raw === "true";
})();
let hideCompleted = localStorage.getItem(HIDE_COMPLETED_KEY) === "true";

let selectedServiceIds = [];
try { selectedServiceIds = JSON.parse(localStorage.getItem(SERVICES_KEY) || "[]"); } catch (e) {}

const SERVICES = [
  { id: "netflix", label: "Netflix", match: ["netflix"] },
  { id: "max", label: "Max", match: ["max"] },
  { id: "hulu", label: "Hulu", match: ["hulu"] },
  { id: "disney", label: "Disney+", match: ["disney"] },
  { id: "appletv", label: "Apple TV+", match: ["apple tv"] },
  { id: "prime", label: "Prime Video", match: ["prime video", "amazon"] },
  { id: "peacock", label: "Peacock", match: ["peacock"] },
  { id: "paramount", label: "Paramount+", match: ["paramount"] },
];

function getSelectedServiceObjs() {
  return SERVICES.filter(s => selectedServiceIds.includes(s.id));
}
function providerMatchesService(providerName, service) {
  const p = providerName.toLowerCase();
  return service.match.some(m => p.includes(m));
}

function catProgress(cat) {
  let done = 0;
  cat.nominees.forEach((n, idx) => { if (isChecked(cat.id, idx)) done++; });
  return { done, total: cat.nominees.length };
}

function overallProgress() {
  let done = 0, total = 0;
  CATEGORIES.forEach(cat => {
    cat.nominees.forEach((n, idx) => { total++; if (isChecked(cat.id, idx)) done++; });
  });
  return { done, total };
}

function picksProgress() {
  let predicted = 0, wanted = 0;
  Object.keys(state.picks).forEach(catId => {
    const p = state.picks[catId];
    if (p && p.predicted != null) predicted++;
    if (p && p.wanted != null) wanted++;
  });
  return { predicted, wanted };
}

function ringSvg(done, total, size, r, strokeWidth, extraClass) {
  const c = 2 * Math.PI * r;
  const pct = total > 0 ? done / total : 0;
  const offset = c * (1 - pct);
  const doneClass = total > 0 && done === total ? " done" : "";
  return '<svg class="ring' + doneClass + (extraClass ? " " + extraClass : "") + '" width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
    '<circle class="track" cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" stroke-width="' + strokeWidth + '"></circle>' +
    '<circle class="prog" cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" stroke-width="' + strokeWidth + '" stroke-dasharray="' + c.toFixed(2) + '" stroke-dashoffset="' + offset.toFixed(2) + '" transform="rotate(-90 ' + size/2 + ' ' + size/2 + ')"></circle>' +
    '</svg>';
}

function matchesSearch(cat) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  if (cat.label.toLowerCase().includes(q)) return true;
  return cat.nominees.some(n => n.display.toLowerCase().includes(q) || (n.episode && n.episode.toLowerCase().includes(q)));
}

function filteredCategories() {
  return CATEGORIES.filter(cat => {
    if (focusMode && FOCUS_HIDDEN_TYPES.includes(cat.type)) return false;
    if (activeTab !== "All" && cat.type !== activeTab) return false;
    if (hideCompleted) {
      const { done, total } = catProgress(cat);
      if (total > 0 && done === total) return false;
    }
    return matchesSearch(cat);
  });
}

function pickButtonsHtml(catId, idx) {
  const predicted = getPredicted(catId) === idx;
  const wanted = getWanted(catId) === idx;
  return '<span class="pick-btn' + (predicted ? " active predicted" : "") + '" data-pick="predicted" data-cat="' + escapeHtml(catId) + '" data-idx="' + idx + '" title="Predicted to win">🔮</span>' +
         '<span class="pick-btn' + (wanted ? " active wanted" : "") + '" data-pick="wanted" data-cat="' + escapeHtml(catId) + '" data-idx="' + idx + '" title="Who I want to win">❤️</span>';
}

/* ---------- Up Next ---------- */
const upNextRequested = new Set();

function computeUpNextCandidates(limit) {
  const shows = Object.keys(SHOW_INDEX).map(title => {
    const refs = SHOW_INDEX[title];
    const total = refs.length;
    const watched = refs.filter(r => isChecked(r.catId, r.idx)).length;
    return { title, total, watched, unwatched: total - watched };
  }).filter(s => s.unwatched > 0);
  shows.sort((a, b) => b.total - a.total || a.title.localeCompare(b.title));
  return shows.slice(0, limit);
}

function renderUpNext() {
  const scroll = document.getElementById("upnextScroll");
  if (!scroll) return;
  const candidates = computeUpNextCandidates(12);

  // Bounded prefetch: only ever attach one resolve-listener per title, so
  // repeated renders never re-trigger (fetchStreaming itself is cached, but
  // without this guard the .then callback would keep re-firing forever).
  candidates.forEach(c => {
    if (!upNextRequested.has(c.title)) {
      upNextRequested.add(c.title);
      fetchStreaming(c.title).then(() => renderUpNext());
    }
  });

  const services = getSelectedServiceObjs();
  const ranked = candidates.map(c => {
    const data = streamCache[c.title];
    const onService = services.length > 0 && !!data && !!data.flatrate &&
      data.flatrate.some(p => services.some(s => providerMatchesService(p, s)));
    return Object.assign({}, c, { onService });
  });
  ranked.sort((a, b) => (b.onService - a.onService) || (b.total - a.total));

  if (ranked.length === 0) {
    scroll.innerHTML = '<div class="upnext-empty">You\'re caught up — nothing left to watch 🎉</div>';
    return;
  }

  scroll.innerHTML = ranked.map(c => {
    return '<div class="upnext-card" data-show="' + escapeHtml(c.title) + '">' +
      posterHtmlFor(c.title, "lg") +
      '<div class="upnext-card-title">' + escapeHtml(c.title) + '</div>' +
      '<div class="upnext-card-sub">' + c.unwatched + ' of ' + c.total + ' left' +
        (c.onService ? ' · <span class="upnext-onservice">on your services</span>' : '') +
      '</div>' +
    '</div>';
  }).join("");

  scroll.querySelectorAll(".upnext-card").forEach(el => {
    el.addEventListener("click", () => openDetail(el.getAttribute("data-show")));
  });
}

function openServicesModal() {
  const detail = document.getElementById("detail");
  const overlay = document.getElementById("overlay");
  function render() {
    detail.innerHTML =
      '<div class="detail-head">' +
        '<div style="flex:1"><h2>Your streaming services</h2>' +
        '<div class="detail-sub">Up Next will prioritize shows available on services you pick.</div></div>' +
        '<div class="detail-close" id="detailClose">✕</div>' +
      '</div>' +
      '<div class="service-grid">' + SERVICES.map(s =>
        '<div class="service-chip' + (selectedServiceIds.includes(s.id) ? " active" : "") + '" data-service="' + s.id + '">' + escapeHtml(s.label) + '</div>'
      ).join("") + '</div>';
    detail.querySelectorAll(".service-chip").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.getAttribute("data-service");
        const i = selectedServiceIds.indexOf(id);
        if (i === -1) selectedServiceIds.push(id); else selectedServiceIds.splice(i, 1);
        try { localStorage.setItem(SERVICES_KEY, JSON.stringify(selectedServiceIds)); } catch (e) {}
        render();
        renderUpNext();
      });
    });
    document.getElementById("detailClose").addEventListener("click", closeDetail);
  }
  render();
  overlay.classList.add("show");
}

/* ---------- countdown ---------- */
const CEREMONY_DATE = new Date("2026-09-14T20:00:00-04:00"); // 78th Emmys, NBC/Peacock
function renderCountdown() {
  const el = document.getElementById("countdown");
  if (!el) return;
  const diffMs = CEREMONY_DATE - new Date();
  if (diffMs <= 0) { el.textContent = "🏆 It\'s Emmy night!"; return; }
  const days = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
  el.textContent = "📅 " + days + " day" + (days === 1 ? "" : "s") + " until the Emmys (Sep 14)";
}

/* ---------- completion celebrations ---------- */
let completionSnapshot = {};
let initialRenderDone = false;

const CONFETTI_COLORS = ["#d4af37", "#e0568c", "#3fb950", "#f2f1ec", "#8a7326"];
function burstConfetti(count) {
  const layer = document.getElementById("confettiLayer");
  if (!layer) return;
  for (let i = 0; i < count; i++) {
    const piece = document.createElement("span");
    piece.className = "confetti-piece";
    piece.style.left = (Math.random() * 100) + "vw";
    piece.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    piece.style.animationDelay = (Math.random() * 0.3) + "s";
    piece.style.animationDuration = (1 + Math.random() * 0.6) + "s";
    layer.appendChild(piece);
    setTimeout(() => piece.remove(), 2000);
  }
}

function celebrateCategory(catId) {
  document.querySelectorAll(".cat-card").forEach(card => {
    if (card.dataset.catCard === catId) {
      card.classList.add("celebrate");
      setTimeout(() => card.classList.remove("celebrate"), 900);
    }
  });
  burstConfetti(20);
}

function checkCategoryCompletions() {
  CATEGORIES.forEach(cat => {
    const { done, total } = catProgress(cat);
    const isDone = total > 0 && done === total;
    const wasDone = completionSnapshot[cat.id];
    if (isDone && wasDone === false) celebrateCategory(cat.id);
    completionSnapshot[cat.id] = isDone;
  });
}

function milestoneMessage(t) {
  if (t === 100) return "🏆 All caught up — every nomination watched!";
  return "🎉 " + t + "% of nominations watched!";
}

function checkOverallMilestones(silent) {
  const { done, total } = overallProgress();
  if (total === 0) return;
  const pct = (done / total) * 100;
  const thresholds = [25, 50, 75, 100];
  let shown = [];
  try { shown = JSON.parse(localStorage.getItem(MILESTONE_KEY) || "[]"); } catch (e) {}
  let changed = false;
  thresholds.forEach(t => {
    if (pct >= t && !shown.includes(t)) {
      shown.push(t);
      changed = true;
      if (!silent) {
        showToast(milestoneMessage(t), 2400);
        if (t === 100) burstConfetti(60);
      }
    }
  });
  if (changed) {
    try { localStorage.setItem(MILESTONE_KEY, JSON.stringify(shown)); } catch (e) {}
  }
}

/* ---------- render ---------- */
function renderTabs() {
  const wrap = document.getElementById("tabs");
  let visibleTypes = TYPES.filter(t => t !== "Other" || CATEGORIES.some(c => c.type === "Other"));
  if (focusMode) visibleTypes = visibleTypes.filter(t => !FOCUS_HIDDEN_TYPES.includes(t));
  wrap.innerHTML = visibleTypes.map(t => {
    const count = t === "All"
      ? CATEGORIES.filter(c => !focusMode || !FOCUS_HIDDEN_TYPES.includes(c.type)).length
      : CATEGORIES.filter(c => c.type === t).length;
    return '<div class="tab' + (activeTab === t ? " active" : "") + '" data-tab="' + escapeHtml(t) + '">' + TYPE_LABELS[t] + ' (' + count + ')</div>';
  }).join("");
  wrap.querySelectorAll(".tab").forEach(el => {
    el.addEventListener("click", () => { activeTab = el.getAttribute("data-tab"); renderAll(); });
  });
}

function renderFilterPills() {
  const focusBtn = document.getElementById("focusModeToggle");
  const hideBtn = document.getElementById("hideCompletedToggle");
  if (focusBtn) focusBtn.classList.toggle("active", focusMode);
  if (hideBtn) hideBtn.classList.toggle("active", hideCompleted);
}

function renderOverall() {
  const { done, total } = overallProgress();
  document.getElementById("overallCount").textContent = done + " / " + total;
  const ringHtml = ringSvg(done, total, 52, 22, 5);
  document.getElementById("overallRing").outerHTML = ringHtml.replace('class="ring', 'id="overallRing" class="ring');
  const { predicted, wanted } = picksProgress();
  document.getElementById("picksSummary").textContent = "🔮 " + predicted + " / " + CATEGORIES.length + " predicted · ❤️ " + wanted + " / " + CATEGORIES.length + " picked";
  renderSavedAt();
}

function renderCatList() {
  const cats = filteredCategories();
  const listEl = document.getElementById("catList");
  const emptyEl = document.getElementById("emptyState");
  if (cats.length === 0) {
    listEl.innerHTML = "";
    emptyEl.style.display = "block";
    return;
  }
  emptyEl.style.display = "none";

  listEl.innerHTML = cats.map(cat => {
    const { done, total } = catProgress(cat);
    const isOpen = openCats.has(cat.id);
    const ring = ringSvg(done, total, 34, 14, 3.5);
    const hasPredicted = getPredicted(cat.id) != null;
    const hasWanted = getWanted(cat.id) != null;
    const dots = (hasPredicted ? '<span class="cat-pick-dot">🔮</span>' : '') + (hasWanted ? '<span class="cat-pick-dot">❤️</span>' : '');
    let nomHtml = "";
    if (isOpen) {
      const visibleNoms = cat.nominees
        .map((n, idx) => ({ n, idx }))
        .filter(({ idx }) => !(hideCompleted && isChecked(cat.id, idx)));
      const hiddenCount = cat.nominees.length - visibleNoms.length;
      const rowsHtml = visibleNoms.map(({ n, idx }) => {
        const checked = isChecked(cat.id, idx);
        const film = extractFilm(n.display);
        const noms = SHOW_INDEX[film] || [];
        const showLink = noms.length > 1 ? '<span class="nom-link" data-show="' + escapeHtml(film) + '">' + noms.length + ' noms &rsaquo;</span>' : "";
        const cached = streamCache[film];
        const badge = cached ? streamBadgeHtml(cached) : "";
        const episodeHtml = n.episode ? '<div class="nom-episode">"' + highlightText(n.episode, searchQuery) + '"</div>' : "";
        return '<div class="nom-row" data-cat="' + escapeHtml(cat.id) + '" data-idx="' + idx + '" data-film="' + escapeHtml(film) + '">' +
          '<div class="nom-check' + (checked ? " checked" : "") + '" data-cat="' + escapeHtml(cat.id) + '" data-idx="' + idx + '">' + (checked ? "✓" : "") + '</div>' +
          '<span class="poster-slot">' + posterHtmlFor(film, "sm") + '</span>' +
          '<div class="nom-body">' +
            '<div class="nom-text' + (checked ? " checked" : "") + '">' + highlightText(n.display, searchQuery) + '</div>' +
            episodeHtml +
            '<div class="nom-meta">' + pickButtonsHtml(cat.id, idx) + '<span class="stream-slot">' + badge + '</span>' + showLink + '</div>' +
          '</div>' +
        '</div>';
      }).join("");
      const hiddenNote = hiddenCount > 0 ? '<div class="hidden-note">' + hiddenCount + ' watched (hidden)</div>' : "";
      nomHtml = '<div class="nom-list">' + rowsHtml + hiddenNote + '</div>';
    }
    return '<div class="cat-card' + (isOpen ? " open" : "") + '" data-cat-card="' + escapeHtml(cat.id) + '">' +
      '<div class="cat-head" data-toggle="' + escapeHtml(cat.id) + '">' +
        '<div class="cat-icon">' + cat.icon + '</div>' +
        '<div class="cat-info"><div class="name">' + highlightText(cat.label, searchQuery) + '</div><div class="grp">' + GROUP_LABELS[cat.group] + dots + '</div></div>' +
        '<div class="cat-count">' + done + '/' + total + '</div>' +
        ring +
        '<div class="chev">▸</div>' +
      '</div>' +
      nomHtml +
    '</div>';
  }).join("");

  // wire up interactions
  listEl.querySelectorAll("[data-toggle]").forEach(el => {
    el.addEventListener("click", () => {
      const id = el.getAttribute("data-toggle");
      if (openCats.has(id)) {
        openCats.delete(id);
      } else {
        openCats.add(id);
        const cat = CATEGORIES.find(c => c.id === id);
        if (cat) prefetchCategory(cat);
      }
      renderAll();
    });
  });

  listEl.querySelectorAll(".nom-check").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const catId = el.getAttribute("data-cat");
      const idx = parseInt(el.getAttribute("data-idx"), 10);
      const cat = CATEGORIES.find(c => c.id === catId);
      const film = extractFilm(cat.nominees[idx].display);
      const newVal = !isChecked(catId, idx);
      cascadeFilm(film, newVal);
    });
  });

  listEl.querySelectorAll(".nom-link").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      openDetail(el.getAttribute("data-show"));
    });
  });

  listEl.querySelectorAll(".pick-btn").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const catId = el.getAttribute("data-cat");
      const idx = parseInt(el.getAttribute("data-idx"), 10);
      const type = el.getAttribute("data-pick");
      if (type === "predicted") setPredicted(catId, idx); else setWanted(catId, idx);
      renderAll();
    });
  });
}

function renderAll() {
  renderTabs();
  renderFilterPills();
  renderOverall();
  renderCountdown();
  renderCatList();
  renderUpNext();
  if (!initialRenderDone) {
    CATEGORIES.forEach(cat => {
      const { done, total } = catProgress(cat);
      completionSnapshot[cat.id] = total > 0 && done === total;
    });
    checkOverallMilestones(true);
    initialRenderDone = true;
  } else {
    checkCategoryCompletions();
    checkOverallMilestones(false);
  }
}

/* ---------- detail view ---------- */
function openDetail(showTitle) {
  const refs = SHOW_INDEX[showTitle] || [];
  const overlay = document.getElementById("overlay");
  const detail = document.getElementById("detail");

  function render() {
    const allChecked = refs.length > 0 && refs.every(r => isChecked(r.catId, r.idx));
    const rowsHtml = refs.map(r => {
      const cat = CATEGORIES.find(c => c.id === r.catId);
      const n = cat.nominees[r.idx];
      const checked = isChecked(r.catId, r.idx);
      const episodeHtml = n.episode ? '<div class="nom-episode">"' + escapeHtml(n.episode) + '"</div>' : "";
      return '<div class="detail-nom-row">' +
        '<div class="nom-check' + (checked ? " checked" : "") + '" data-cat="' + escapeHtml(r.catId) + '" data-idx="' + r.idx + '">' + (checked ? "✓" : "") + '</div>' +
        '<div class="txt">' +
          '<div class="cat">' + cat.icon + ' ' + escapeHtml(cat.label) + '</div>' +
          '<div class="' + (checked ? "nom-text checked" : "nom-text") + '">' + escapeHtml(n.display) + '</div>' + episodeHtml +
          '<div class="nom-meta">' + pickButtonsHtml(r.catId, r.idx) + '</div>' +
        '</div>' +
      '</div>';
    }).join("");

    detail.innerHTML =
      '<div class="detail-head">' +
        '<span class="detail-poster-slot">' + posterHtmlFor(showTitle, "xl") + '</span>' +
        '<div style="flex:1; min-width:0;">' +
          '<h2>' + escapeHtml(showTitle) + '</h2>' +
          '<div class="detail-sub">' + refs.length + ' nomination' + (refs.length === 1 ? "" : "s") + '</div>' +
        '</div>' +
        '<div class="detail-close" id="detailClose">✕</div>' +
      '</div>' +
      '<div class="stream-section">' +
        '<div class="lbl">Where to watch</div>' +
        '<div id="streamArea"><span class="stream-empty">Loading…</span></div>' +
      '</div>' +
      '<button class="mark-all-btn' + (allChecked ? " done" : "") + '" id="markAllBtn">' + (allChecked ? "✓ All marked as seen" : "Mark all " + refs.length + " as seen") + '</button>' +
      '<div class="detail-noms">' + rowsHtml + '</div>';

    detail.querySelectorAll(".nom-check").forEach(el => {
      el.addEventListener("click", () => {
        const catId = el.getAttribute("data-cat");
        const idx = parseInt(el.getAttribute("data-idx"), 10);
        const newVal = !isChecked(catId, idx);
        if (newVal) {
          // Checking a nomination on cascades to every other nomination for
          // this show, same as checking it from the main category list.
          cascadeFilm(showTitle, true);
          render();
        } else {
          // Unchecking is single-entry only, so you can carve out "I haven't
          // actually seen this specific episode" without undoing the rest.
          setChecked(catId, idx, false);
          saveState();
          render();
          renderCatList();
          renderOverall();
          renderUpNext();
        }
      });
    });

    detail.querySelectorAll(".pick-btn").forEach(el => {
      el.addEventListener("click", () => {
        const catId = el.getAttribute("data-cat");
        const idx = parseInt(el.getAttribute("data-idx"), 10);
        const type = el.getAttribute("data-pick");
        if (type === "predicted") setPredicted(catId, idx); else setWanted(catId, idx);
        render();
        renderCatList();
        renderOverall();
      });
    });

    document.getElementById("markAllBtn").addEventListener("click", () => {
      cascadeFilm(showTitle, true);
      render();
    });

    document.getElementById("detailClose").addEventListener("click", closeDetail);

    fetchStreaming(showTitle).then(data => {
      const posterSlot = detail.querySelector(".detail-poster-slot");
      if (posterSlot) posterSlot.innerHTML = posterHtmlFor(showTitle, "xl");
      const area = document.getElementById("streamArea");
      if (!area) return;
      const chips = [];
      (data.flatrate || []).forEach(p => chips.push('<span class="provider-chip">▶ ' + escapeHtml(p) + '</span>'));
      (data.rent || []).forEach(p => chips.push('<span class="provider-chip">$ ' + escapeHtml(p) + ' (rent)</span>'));
      (data.buy || []).forEach(p => chips.push('<span class="provider-chip">$ ' + escapeHtml(p) + ' (buy)</span>'));
      if (chips.length === 0) {
        area.innerHTML = '<span class="stream-empty">No streaming info found.</span>';
      } else {
        area.innerHTML = '<div class="provider-chips">' + chips.join("") + '</div>' +
          (data.link ? '<a class="stream-link" href="' + escapeHtml(data.link) + '" target="_blank" rel="noopener">Open on JustWatch ›</a>' : "");
      }
    });
  }

  render();
  overlay.classList.add("show");
}

  document.getElementById("overlay").classList.remove("show");
}
document.getElementById("overlay").addEventListener("click", (e) => {
  if (e.target.id === "overlay") closeDetail();

/* ---------- search ---------- */

  searchQuery = e.target.value.trim();

  searchInputEl.value = "";
  searchQuery = "";
  searchClearEl.classList.remove("show");
  renderCatList();
  searchInputEl.focus();
});

/* ---------- collapse all ---------- */
document.getElementById("collapseAllBtn").addEventListener("click", () => {
  openCats.clear();
  renderCatList();
});

/* ---------- filter pills + services modal wiring ---------- */
document.getElementById("focusModeToggle").addEventListener("click", () => {
  focusMode = !focusMode;
  try { localStorage.setItem(FOCUS_MODE_KEY, String(focusMode)); } catch (e) {}
  if (focusMode && FOCUS_HIDDEN_TYPES.includes(activeTab)) activeTab = "All";
  renderAll();
});
document.getElementById("hideCompletedToggle").addEventListener("click", () => {
  hideCompleted = !hideCompleted;
  try { localStorage.setItem(HIDE_COMPLETED_KEY, String(hideCompleted)); } catch (e) {}
  renderAll();
});
document.getElementById("manageServicesBtn").addEventListener("click", openServicesModal);

/* ---------- init ---------- */
renderAll();
</script>
</body>
</html>
